spring.application.name=mcp_github
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.name=github-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.main.web-application-type=none
spring.main.banner-mode=off

logging.level.root=OFF
logging.level.org.springframework.data.mongodb=OFF
# GitHub API configuration
github.api.base-url=https://api.github.com
github.api.token=${GITHUB_TOKEN:} 

# MongoDB configuration
spring.data.mongodb.uri=mongodb://localhost:27017/mcp_github

spring.data.mongodb.repositories.type=imperative



